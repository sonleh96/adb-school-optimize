[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "school-scoring"
version = "0.1.0"
description = "Deterministic school need and priority scoring engine for RISE-PNG."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "pandas",
    "shapely",
    "pyproj",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["school_scoring*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
